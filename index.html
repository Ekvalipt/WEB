<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <title>Лабораторна робота №1</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav>
        <h2>Меню</h2>
        <ul>
            <li><a href="#task1">Подільність числа</a></li>
            <li><a href="#task2">НСД і НСК</a></li>
            <li><a href="#task3">Сума цифр</a></li>
        </ul>
    </nav>

    <main class="container">

        <section id="task1">
            <h1>Перевірка подільності</h1>

            <input type="number" id="numberInput">
            <button onclick="checkNumber()">Перевірити</button>

            <div id="result1"></div>
        </section>


        <section id="task2">
            <h1>НСД та НСК</h1>

            <input type="number" id="num1" placeholder="Перше число">
            <input type="number" id="num2" placeholder="Друге число">

            <button onclick="gcdLcm()">Обчислити</button>

            <div id="result2"></div>
        </section>


        <section id="task3">
            <h1>Число з найбільшою сумою цифр</h1>

            <input type="text" id="numbers" placeholder="Введіть числа через пробіл">

            <button onclick="maxDigitSum()">Знайти</button>

            <div id="result3"></div>
        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
